name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - "voidpen-server/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Build Server
        working-directory: ./voidpen-server
        run: |
          mvn -B -DskipTests package
          cp target/voidpen-server-*.jar target/voidpen-server.jar

      - name: Upload JAR
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "voidpen-server/target/voidpen-server.jar"
          target: "/opt/voidpen/server/"
          strip_components: 2

      - name: Restart Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            chmod +x /opt/voidpen/server/start.sh /opt/voidpen/server/stop.sh
            /opt/voidpen/server/stop.sh || true
            sleep 2
            /opt/voidpen/server/start.sh
            sleep 8
            code=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://127.0.0.1:8080/admin/v1/auth/login" -H "Content-Type: application/json" -d "{}" || true)
            if [ "$code" = "400" ] || [ "$code" = "401" ] || [ "$code" = "405" ]; then
              echo "Server health check passed: $code"
              exit 0
            fi
            echo "Server health check failed: $code"
            exit 1
