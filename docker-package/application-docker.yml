# ─────────────────────────────────────────────
#  voidpen-server/src/main/resources/application-docker.yml
#  Docker Compose 环境专用配置
#  所有敏感值通过环境变量注入（docker-compose.yml 中定义）
# ─────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      connection-timeout: 30000
      idle-timeout: 600000

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  # 开发环境下暴露 actuator（用于 healthcheck）
  management:
    endpoints:
      web:
        exposure:
          include: health
    endpoint:
      health:
        show-details: never

voidpen:
  jwt:
    secret: ${JWT_SECRET}
    expire: 7200
  oss:
    access-key-id: ${OSS_KEY_ID:}
    access-key-secret: ${OSS_KEY_SECRET:}
    endpoint: ${OSS_ENDPOINT:}
    bucket: ${OSS_BUCKET:}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

# Docker 环境保留 Knife4j（方便调试）
knife4j:
  enable: true
