spring:
  profiles:
    active: dev
  application:
    name: voidpen-server
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    property-naming-strategy: com.fasterxml.jackson.databind.PropertyNamingStrategies$LowerCamelCaseStrategy
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

server:
  port: 8080

knife4j:
  enable: true
  setting:
    language: zh_cn

voidpen:
  jwt:
    secret: your-256-bit-secret-key-here-change-in-prod
    expire: 7200
  cors:
    allowed-origins: http://localhost:5173,http://localhost:5174
  oss:
    base-url: http://localhost:${server.port}/uploads
    local-dir: uploads
