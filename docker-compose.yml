services:
  mysql:
    image: mysql:8.0
    container_name: voidpen-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./volumes/mysql:/var/lib/mysql
      - ./voidpen-server/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command:
      [
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci",
        "--default-time-zone=+08:00"
      ]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: voidpen-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      [
        "redis-server",
        "--requirepass",
        "${REDIS_PASSWORD}",
        "--appendonly",
        "yes",
        "--save",
        "60",
        "1"
      ]
    ports:
      - "6379:6379"
    volumes:
      - ./volumes/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10

  server:
    build:
      context: ./voidpen-server
      dockerfile: Dockerfile
    container_name: voidpen-server
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USERNAME: ${MYSQL_USER}
      DB_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      VOIDPEN_JWT_SECRET: ${JWT_SECRET}
      VOIDPEN_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:5174
      VOIDPEN_OSS_BASE_URL: http://localhost:8080/uploads
      VOIDPEN_OSS_LOCAL_DIR: /app/uploads
      LOGGING_FILE_NAME: /app/logs/app.log
    ports:
      - "8080:8080"
    volumes:
      - ./volumes/uploads:/app/uploads
      - ./volumes/server-logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./voidpen-frontend
      dockerfile: Dockerfile
    container_name: voidpen-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    volumes:
      - ./volumes/frontend-nginx-logs:/var/log/nginx
    depends_on:
      - server

  admin:
    build:
      context: ./voidpen-admin
      dockerfile: Dockerfile
      args:
        VITE_FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-}
    container_name: voidpen-admin
    restart: unless-stopped
    ports:
      - "5174:80"
    volumes:
      - ./volumes/admin-nginx-logs:/var/log/nginx
    depends_on:
      - server
