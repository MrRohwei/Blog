spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:mysql}:${DB_PORT:3306}/${DB_NAME:voidpen}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:voidpen}
    password: ${DB_PASSWORD:Voidpen@123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  mapper-locations: classpath:mapper/*.xml

knife4j:
  enable: true

voidpen:
  jwt:
    secret: ${VOIDPEN_JWT_SECRET:voidpen-local-dev-secret-key-change-in-prod}
    expire: ${VOIDPEN_JWT_EXPIRE:7200}
  cors:
    allowed-origins: ${VOIDPEN_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
  oss:
    base-url: ${VOIDPEN_OSS_BASE_URL:http://localhost:8080/uploads}
    local-dir: ${VOIDPEN_OSS_LOCAL_DIR:/app/uploads}
