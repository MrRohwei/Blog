name: Deploy Admin

on:
  push:
    branches: [main]
    paths:
      - "voidpen-admin/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: voidpen-admin/package-lock.json

      - name: Build Admin
        working-directory: ./voidpen-admin
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://admin.yourdomain.com' }}
        run: |
          npm ci
          npm run build

      - name: Clean Remote Admin Dist
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            mkdir -p /opt/voidpen/admin/dist
            rm -rf /opt/voidpen/admin/dist/*

      - name: Upload Admin Dist
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "voidpen-admin/dist/*"
          target: "/opt/voidpen/admin/dist/"
          strip_components: 2
