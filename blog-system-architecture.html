<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>个人博客系统 · 整体架构图</title>
<style>
  body {
    margin: 0;
    padding: 24px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #ffffff;
    color: #1a1a1a;
  }
  h1 {
    font-size: 18px;
    font-weight: 500;
    margin: 0 0 4px;
    color: #1a1a1a;
  }
  .subtitle {
    font-size: 13px;
    color: #6b6b6b;
    margin-bottom: 24px;
  }
  svg text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  .t  { font-size: 14px; font-weight: 400; fill: #3d3d3a; }
  .ts { font-size: 12px; font-weight: 400; fill: #6b6b6b; }
  .th { font-size: 14px; font-weight: 500; fill: #3d3d3a; }

  /* color ramps */
  .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }
  .c-gray   rect, .c-gray   circle { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray   .th { fill: #444441; }
  .c-gray   .ts { fill: #5F5E5A; }
  .c-teal   rect, .c-teal   circle { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal   .th { fill: #085041; }
  .c-teal   .ts { fill: #0F6E56; }
  .c-blue   rect, .c-blue   circle { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue   .th { fill: #0C447C; }
  .c-blue   .ts { fill: #185FA5; }
  .c-coral  rect, .c-coral  circle { fill: #FAECE7; stroke: #993C1D; }
  .c-coral  .th { fill: #712B13; }
  .c-coral  .ts { fill: #993C1D; }
  .c-amber  rect, .c-amber  circle { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber  .th { fill: #633806; }
  .c-amber  .ts { fill: #854F0B; }

  .arr  { stroke: #888780; stroke-width: 1.5; fill: none; }
  .zone { font-size: 12px; font-weight: 400; fill: #b4b2a9; }
  .div  { stroke: #d3d1c7; stroke-width: 0.5; stroke-dasharray: 4 4; }

  @media (prefers-color-scheme: dark) {
    body { background: #1a1a18; color: #d4d2c8; }
    h1 { color: #d4d2c8; }
    .subtitle { color: #888780; }
    .t  { fill: #c2c0b6; }
    .ts { fill: #888780; }
    .th { fill: #c2c0b6; }
    .c-purple rect { fill: #26215C; stroke: #AFA9EC; }
    .c-purple .th  { fill: #CECBF6; }
    .c-purple .ts  { fill: #AFA9EC; }
    .c-gray   rect { fill: #2C2C2A; stroke: #B4B2A9; }
    .c-gray   .th  { fill: #D3D1C7; }
    .c-gray   .ts  { fill: #B4B2A9; }
    .c-teal   rect { fill: #04342C; stroke: #5DCAA5; }
    .c-teal   .th  { fill: #9FE1CB; }
    .c-teal   .ts  { fill: #5DCAA5; }
    .c-blue   rect { fill: #042C53; stroke: #85B7EB; }
    .c-blue   .th  { fill: #B5D4F4; }
    .c-blue   .ts  { fill: #85B7EB; }
    .c-coral  rect { fill: #4A1B0C; stroke: #F0997B; }
    .c-coral  .th  { fill: #F5C4B3; }
    .c-coral  .ts  { fill: #F0997B; }
    .c-amber  rect { fill: #412402; stroke: #EF9F27; }
    .c-amber  .th  { fill: #FAC775; }
    .c-amber  .ts  { fill: #EF9F27; }
    .arr { stroke: #888780; }
    .zone { fill: #5F5E5A; }
    .div  { stroke: #444441; }
  }
</style>
</head>
<body>
<h1>个人博客系统 · 整体架构图</h1>
<div class="subtitle">Vue 3 + Spring Boot 3.x · blog-frontend / blog-admin / blog-server</div>

<svg width="100%" viewBox="0 0 680 560" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Zone labels -->
  <text class="zone" x="40" y="72">客户端</text>
  <text class="zone" x="40" y="218">接入层</text>
  <text class="zone" x="40" y="348">应用层</text>
  <text class="zone" x="40" y="468">数据层</text>

  <!-- Dividers -->
  <line class="div" x1="40" y1="130" x2="640" y2="130"/>
  <line class="div" x1="40" y1="270" x2="640" y2="270"/>
  <line class="div" x1="40" y1="400" x2="640" y2="400"/>

  <!-- Row 1: Frontend -->
  <g class="c-purple">
    <rect x="80" y="44" width="230" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="195" y="65" text-anchor="middle" dominant-baseline="central">前台展示系统</text>
    <text class="ts" x="195" y="83" text-anchor="middle" dominant-baseline="central">Vue 3 · Vite · Pinia · Vue Router</text>
  </g>
  <g class="c-purple">
    <rect x="370" y="44" width="230" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="485" y="65" text-anchor="middle" dominant-baseline="central">后台管理系统</text>
    <text class="ts" x="485" y="83" text-anchor="middle" dominant-baseline="central">Vue 3 · Element Plus · Pinia</text>
  </g>

  <!-- Row 2: Nginx -->
  <g class="c-gray">
    <rect x="210" y="155" width="260" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="176" text-anchor="middle" dominant-baseline="central">Nginx</text>
    <text class="ts" x="340" y="194" text-anchor="middle" dominant-baseline="central">反向代理 · SSL · 静态资源</text>
  </g>

  <!-- Row 3: Spring Boot -->
  <g class="c-teal">
    <rect x="150" y="285" width="380" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="306" text-anchor="middle" dominant-baseline="central">Spring Boot 3.x 后端服务</text>
    <text class="ts" x="340" y="324" text-anchor="middle" dominant-baseline="central">Spring Security · JWT · MyBatis-Plus · Knife4j</text>
  </g>

  <!-- Row 4: Data -->
  <g class="c-blue">
    <rect x="60" y="420" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="140" y="441" text-anchor="middle" dominant-baseline="central">MySQL 8.0</text>
    <text class="ts" x="140" y="459" text-anchor="middle" dominant-baseline="central">主数据库</text>
  </g>
  <g class="c-coral">
    <rect x="260" y="420" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="340" y="441" text-anchor="middle" dominant-baseline="central">Redis 7.x</text>
    <text class="ts" x="340" y="459" text-anchor="middle" dominant-baseline="central">缓存 · Token 黑名单</text>
  </g>
  <g class="c-amber">
    <rect x="460" y="420" width="160" height="56" rx="8" stroke-width="0.5"/>
    <text class="th" x="540" y="441" text-anchor="middle" dominant-baseline="central">OSS 对象存储</text>
    <text class="ts" x="540" y="459" text-anchor="middle" dominant-baseline="central">图片 · 文件上传</text>
  </g>

  <!-- Arrows: Row1 → Nginx -->
  <path d="M 195 100 L 195 143 L 280 143 L 280 155" class="arr" marker-end="url(#arrow)"/>
  <path d="M 485 100 L 485 143 L 400 143 L 400 155" class="arr" marker-end="url(#arrow)"/>

  <!-- Arrow: Nginx → Spring Boot -->
  <path d="M 340 211 L 340 285" class="arr" marker-end="url(#arrow)"/>
  <rect x="296" y="234" width="88" height="18" rx="4" fill="white" fill-opacity="0.7"/>
  <text class="ts" x="340" y="246" text-anchor="middle" dominant-baseline="central">REST API · JWT</text>

  <!-- Arrows: Spring Boot → Data layer -->
  <path d="M 340 341 L 340 385 L 140 385 L 140 420" class="arr" marker-end="url(#arrow)"/>
  <path d="M 340 341 L 340 420" class="arr" marker-end="url(#arrow)"/>
  <path d="M 340 341 L 340 385 L 540 385 L 540 420" class="arr" marker-end="url(#arrow)"/>
</svg>
</body>
</html>
