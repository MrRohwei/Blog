spring:
  datasource:
    url: ${VOIDPEN_DB_URL}
    username: ${VOIDPEN_DB_USERNAME}
    password: ${VOIDPEN_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${VOIDPEN_REDIS_HOST}
      port: ${VOIDPEN_REDIS_PORT:6379}
      password: ${VOIDPEN_REDIS_PASSWORD:}
      database: ${VOIDPEN_REDIS_DATABASE:0}

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl
  mapper-locations: classpath:mapper/*.xml

knife4j:
  enable: false

voidpen:
  jwt:
    secret: ${VOIDPEN_JWT_SECRET}
    expire: ${VOIDPEN_JWT_EXPIRE:7200}
  cors:
    allowed-origins: ${VOIDPEN_CORS_ALLOWED_ORIGINS:https://yourdomain.com,https://admin.yourdomain.com}
